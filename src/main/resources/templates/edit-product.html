<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>编辑商品</title>
</head>
<body>

<h2>编辑商品</h2>
<form action="/update-product" method="post">
    <!-- 使用 Thymeleaf 来填充初始值 -->
    <input type="hidden" name="originalName" th:value="${param.name}" />
    商品名称：<input type="text" name="name" th:value="${param.name}" required /><br/>
    商品价格：<input type="number" step="0.01" name="price" th:value="${param.price}" required /><br/>
    <button type="submit">保存修改</button>
</form>

<!-- 返回按钮 -->
<a href="/">返回商品列表</a>

</body>
</html>
